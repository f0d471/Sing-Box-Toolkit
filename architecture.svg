<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Consolas, 'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#533483"/>
    </linearGradient>
    <linearGradient id="menuGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1b9c85"/>
      <stop offset="100%" stop-color="#0e7a6a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ff88"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4ff"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b6b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" rx="12" fill="url(#bg)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="44" rx="12" fill="url(#header)"/>
  <rect x="0" y="22" width="800" height="22" fill="url(#header)"/>
  <text x="400" y="29" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">Sing-Box Toolkit — Architecture</text>

  <!-- ===== Layer 1: Entry Point ===== -->
  <!-- manage.bat -->
  <rect x="300" y="60" width="200" height="36" rx="8" fill="url(#menuGrad)" opacity="0.95" filter="url(#glow)"/>
  <text x="400" y="83" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">manage.bat</text>

  <!-- User / AI labels -->
  <text x="170" y="82" text-anchor="middle" fill="#aaa" font-size="11">👤 User / 🤖 AI Agent</text>
  <rect x="40" y="68" width="100" height="28" rx="6" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="90" y="86" text-anchor="middle" fill="#ccc" font-size="10">Double-click</text>

  <line x1="140" y1="82" x2="295" y2="78" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>
  <line x1="230" y1="82" x2="295" y2="82" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>

  <!-- ===== Layer 2: Menu Engine ===== -->
  <line x1="400" y1="96" x2="400" y2="115" stroke="#e94560" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Menu panel -->
  <rect x="240" y="115" width="320" height="130" rx="8" fill="#0d1b3e" stroke="#e94560" stroke-width="1.5"/>
  <text x="400" y="136" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="bold">menu.ps1 — Interactive Menu Engine</text>
  <line x1="260" y1="144" x2="540" y2="144" stroke="#333" stroke-width="0.5"/>

  <!-- Menu items as pills -->
  <rect x="260" y="154" width="80" height="22" rx="5" fill="#1a3a5c"/>
  <text x="300" y="169" text-anchor="middle" fill="#8cf" font-size="10">[1] Start</text>
  <rect x="348" y="154" width="80" height="22" rx="5" fill="#1a3a5c"/>
  <text x="388" y="169" text-anchor="middle" fill="#8cf" font-size="10">[2] Stop</text>
  <rect x="436" y="154" width="80" height="22" rx="5" fill="#1a3a5c"/>
  <text x="476" y="169" text-anchor="middle" fill="#8cf" font-size="10">[3] Status</text>

  <rect x="260" y="182" width="80" height="22" rx="5" fill="#1a3a5c"/>
  <text x="300" y="197" text-anchor="middle" fill="#8cf" font-size="10">[4] Nodes</text>
  <rect x="348" y="182" width="80" height="22" rx="5" fill="#1a3a5c"/>
  <text x="388" y="197" text-anchor="middle" fill="#8cf" font-size="10">[5] Update</text>
  <rect x="436" y="182" width="80" height="22" rx="5" fill="#1a3a5c"/>
  <text x="476" y="197" text-anchor="middle" fill="#8cf" font-size="10">[6] WDog</text>

  <rect x="260" y="210" width="80" height="22" rx="5" fill="#1a3a5c"/>
  <text x="300" y="225" text-anchor="middle" fill="#8cf" font-size="10">[7] Auto</text>
  <rect x="348" y="210" width="80" height="22" rx="5" fill="#1a3a5c"/>
  <text x="388" y="225" text-anchor="middle" fill="#8cf" font-size="10">[8] Setup</text>

  <!-- ===== Layer 3: Scripts ===== -->
  <line x1="320" y1="245" x2="200" y2="280" stroke="#e94560" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="400" y1="245" x2="400" y2="280" stroke="#e94560" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="480" y1="245" x2="600" y2="280" stroke="#e94560" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Scripts box -->
  <rect x="40" y="280" width="720" height="95" rx="8" fill="#0d1b3e" stroke="#1a3a5c" stroke-width="1"/>
  <text x="60" y="300" fill="#00d4ff" font-size="12" font-weight="bold">scripts/</text>

  <!-- Script pills -->
  <rect x="55" y="312" width="100" height="24" rx="5" fill="#0f3460"/>
  <text x="105" y="328" text-anchor="middle" fill="#fff" font-size="10">start.ps1</text>
  <rect x="162" y="312" width="100" height="24" rx="5" fill="#0f3460"/>
  <text x="212" y="328" text-anchor="middle" fill="#fff" font-size="10">stop.ps1</text>
  <rect x="269" y="312" width="100" height="24" rx="5" fill="#0f3460"/>
  <text x="319" y="328" text-anchor="middle" fill="#fff" font-size="10">status.ps1</text>
  <rect x="376" y="312" width="100" height="24" rx="5" fill="#0f3460"/>
  <text x="426" y="328" text-anchor="middle" fill="#fff" font-size="10">update.ps1</text>
  <rect x="483" y="312" width="120" height="24" rx="5" fill="#533483"/>
  <text x="543" y="328" text-anchor="middle" fill="#fff" font-size="10">watchdog.ps1</text>
  <rect x="610" y="312" width="100" height="24" rx="5" fill="#0f3460"/>
  <text x="660" y="328" text-anchor="middle" fill="#fff" font-size="10">setup.ps1</text>

  <rect x="200" y="345" width="150" height="24" rx="5" fill="#1b9c85"/>
  <text x="275" y="361" text-anchor="middle" fill="#fff" font-size="10">env.ps1 (core)</text>

  <!-- ===== Layer 4: sing-box ===== -->
  <line x1="250" y1="375" x2="250" y2="410" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="550" y1="375" x2="550" y2="410" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <rect x="120" y="410" width="260" height="70" rx="8" fill="url(#userGrad)" opacity="0.9"/>
  <text x="250" y="435" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">sing-box.exe</text>
  <text x="250" y="455" text-anchor="middle" fill="#d4f5e9" font-size="10">(user downloads from GitHub)</text>
  <text x="250" y="472" text-anchor="middle" fill="#8dd" font-size="10">TUN · DNS · Routing · Clash API</text>

  <rect x="420" y="410" width="260" height="70" rx="8" fill="url(#userGrad)" opacity="0.9"/>
  <text x="550" y="435" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">config.json</text>
  <text x="550" y="455" text-anchor="middle" fill="#d4f5e9" font-size="10">(user obtains from provider)</text>
  <text x="550" y="472" text-anchor="middle" fill="#8dd" font-size="10">Inbounds · Outbounds · Rules</text>

  <!-- ===== Footer: Watchdog & Dashboard ===== -->
  <line x1="250" y1="480" x2="250" y2="510" stroke="#00d4ff" stroke-width="1"/>
  <line x1="550" y1="480" x2="550" y2="510" stroke="#00d4ff" stroke-width="1"/>

  <!-- Windows Tasks -->
  <rect x="80" y="510" width="340" height="80" rx="8" fill="#0d1b3e" stroke="#533483" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="250" y="532" text-anchor="middle" fill="#b388ff" font-size="11" font-weight="bold">Windows Scheduled Tasks</text>
  <text x="250" y="552" text-anchor="middle" fill="#888" font-size="10">Watchdog (5min) · DailyRestart (4am) · MemoryGuard (10min)</text>
  <text x="250" y="570" text-anchor="middle" fill="#888" font-size="10">Sing-Box AutoStart (boot)</text>
  <text x="250" y="584" text-anchor="middle" fill="#666" font-size="9">installed by setup.ps1 or menu [6]/[7]</text>

  <!-- Dashboard -->
  <rect x="460" y="510" width="260" height="80" rx="8" fill="#0d1b3e" stroke="#1b9c85" stroke-width="1"/>
  <text x="590" y="532" text-anchor="middle" fill="#4db6ac" font-size="11" font-weight="bold">YACD Dashboard</text>
  <text x="590" y="552" text-anchor="middle" fill="#888" font-size="10">http://127.0.0.1:9090/ui</text>
  <text x="590" y="570" text-anchor="middle" fill="#888" font-size="10">Proxies · Rules · Connections · Logs</text>
  <text x="590" y="584" text-anchor="middle" fill="#666" font-size="9">sing-box internal, no extra install</text>

  <!-- AI label bottom -->
  <text x="400" y="595" text-anchor="middle" fill="#555" font-size="9">Every component is a file or API — AI agents can read, call, and control everything.</text>
</svg>
